<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

    <title>Wod Feeder</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
    <style>
        .dates {
            white-space: nowrap
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Wod Feeder</h1>
        <p>All your workouts in your hands</p>
    </div>

    <div id="latestWorkouts">
        <table class="table table-hover table-responsive">
            <thead>
            <tr>
                <th scope="col">Day</th>
                <th scope="col">Date</th>
                <th scope="col">Workout</th>
            </tr>
            </thead>
            <tbody>
            <tr scope="row" th:each="workout : ${latestWorkouts}">
                <td><span th:text="${workout.getKey().dayOfWeek}"></span></td>
                <td class="dates"><span th:text="${workout.getKey()}"></span></td>
                <td><span th:text="${workout.getValue()}"></span></td>
            </tr>
            </tbody>
        </table>
    </div>

</div>


</body>
</html>
